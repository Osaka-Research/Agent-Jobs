<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Agent Jobs</title>
<link rel="stylesheet" href="/static/style.css?v=6" />
</head>
<body>
<header>
  <h1>Agent Jobs</h1>
</header>

<form id="searchForm">
  <div class="row">
    <label>
      <span>role / keywords</span>
      <input id="searchTerm" type="text" placeholder="e.g. python backend" required autocomplete="off" />
    </label>
    <label class="phone-label">
      <span>phone (optional, E.164: +countrycode...)</span>
      <input id="phone" type="tel" placeholder="+919876543210" autocomplete="off" pattern="^\+[1-9]\d{7,14}$" />
    </label>
    <label class="location-label">
      <span>location</span>
      <div class="location-row">
        <input id="location" type="text" placeholder="e.g. Remote, San Francisco" list="locations" autocomplete="off" />
        <button type="button" id="locateBtn" class="locate-btn" title="use my current location">📍 locate me</button>
      </div>
      <datalist id="locations"></datalist>
    </label>
    <button type="submit">search</button>
  </div>
</form>

<section id="status" aria-live="polite"></section>

<section id="results" aria-live="polite">
  <div class="empty">enter a role and hit search.</div>
</section>

<footer>
  <span id="healthInfo"></span>
</footer>

<script src="/static/app.js?v=10"></script>
</body>
</html>
